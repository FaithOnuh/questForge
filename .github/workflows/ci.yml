name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & Type-check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm format:check

  # ─── Frontend tests ─────────────────────────────────────────────────────────
  test-web:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web test
      - run: pnpm --filter web build

  # ─── Backend tests ──────────────────────────────────────────────────────────
  test-api:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: questforge
          POSTGRES_PASSWORD: questforge
          POSTGRES_DB: questforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://questforge:questforge@localhost:5432/questforge
      JWT_SECRET: test_secret
      STELLAR_NETWORK: testnet
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
      CONTRACT_ID: placeholder
      SOROBAN_SECRET_KEY: placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api prisma:generate

      - name: Run migrations
        run: pnpm --filter api exec prisma migrate deploy

      - run: pnpm --filter api test
      - run: pnpm --filter api build

  # ─── Soroban contract ───────────────────────────────────────────────────────
  test-contract:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/quest-forge

      - name: Run contract tests
        working-directory: contracts/quest-forge
        run: cargo test

      - name: Build contract (release)
        working-directory: contracts/quest-forge
        run: cargo build --release --target wasm32-unknown-unknown
