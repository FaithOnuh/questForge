name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options: [testnet, mainnet]

jobs:
  deploy-contract:
    name: Deploy Soroban Contract
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.network || 'testnet' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/quest-forge

      - name: Build contract
        working-directory: contracts/quest-forge
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli

      - name: Deploy contract
        working-directory: contracts/quest-forge
        env:
          SOROBAN_SECRET_KEY: ${{ secrets.SOROBAN_SECRET_KEY }}
          STELLAR_NETWORK: ${{ github.event.inputs.network || 'testnet' }}
          SOROBAN_RPC_URL: ${{ secrets.SOROBAN_RPC_URL }}
        run: |
          CONTRACT_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/quest_forge.wasm \
            --network $STELLAR_NETWORK \
            --secret-key $SOROBAN_SECRET_KEY \
            --rpc-url $SOROBAN_RPC_URL)
          echo "CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_OUTPUT
          echo "Deployed contract: $CONTRACT_ID"
